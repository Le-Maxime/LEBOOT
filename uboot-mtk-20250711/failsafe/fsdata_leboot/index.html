<!DOCTYPE HTML>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title data-i18n="index.title">SYSTEM INFORMATION</title>
	<script src="/theme.js"></script>
	<link rel="stylesheet" href="/style.css">
	<script src="/i18n.js"></script>

<body onload="appInit('index')" data-page="index">

							<line x1="12" y1="16" x2="12" y2="12"></line>
							<line x1="12" y1="8" x2="12.01" y2="8"></line>
						</svg>
					</div>
					<h1 data-i18n="index.title">SYSTEM INFORMATION</h1>
					<p id="hint" data-i18n-html="index.hint">
						System specifications and current running state.
					</p>
				</div>
				<div class="card-main">
					<div id="sysinfo" class="sysinfo" data-i18n="sysinfo.loading">Loading system info...</div>
				</div>
			</div>
			<div id="version"></div>
		</div>
	</div>

</html>
